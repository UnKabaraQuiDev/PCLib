# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path

name: Maven Package

on:
  workflow_dispatch:
#  release:
#    types: [created]
  schedule:
    - cron: '0 3 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Debug
      run: git log --pretty=fuller --name-only -20
    - name: Check for commits in last 26h
      id: changes
      if: github.event_name == 'schedule'
      run: |
        git log --since='26 hours ago' -1 --oneline -- . ':(exclude).github/**'
        if [ -n "$(git log --since='26 hours ago' -1 --oneline -- . ':(exclude).github/**')" ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
        fi
        cat $GITHUB_OUTPUT
    - name: Stop if no changes
      if: github.event_name == 'schedule' && steps.changes.outputs.has_changes != 'true'
      run: echo "No commits in last 26 hours. Skipping build."
    - uses: actions/setup-java@v5
      if: github.event_name != 'schedule' || steps.changes.outputs.has_changes == 'true'
      with:
        distribution: temurin
        java-version: 17
        server-id: nexus.kbra.lu-releases
        server-username: MAVEN_USERNAME
        server-password: MAVEN_PASSWORD
    - uses: actions/setup-java@v5
      if: github.event_name != 'schedule' || steps.changes.outputs.has_changes == 'true'
      with:
        distribution: temurin
        java-version: 17
        server-id: nexus.kbra.lu-snapshots
        server-username: MAVEN_USERNAME
        server-password: MAVEN_PASSWORD
    - name: Build with Maven
      if: github.event_name != 'schedule' || steps.changes.outputs.has_changes == 'true'
      run: mvn -B clean compile package deploy
