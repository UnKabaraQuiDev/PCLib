name: CodeQL

on:
  workflow_dispatch:
    inputs:
      branches:
        description: "Additional branches (comma-separated)"
        required: false
        default: ""
  pull_request:
  schedule:
    - cron: '1 0 * * 0'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      branches: ${{ steps.branches.outputs.branches }}

    steps:
      - id: branches
        uses: actions/github-script@v7
        with:
          script: |
            let branches = [];

            if (context.eventName === "pull_request") {
              branches = [context.payload.pull_request.head.ref];
            } else {
              branches = ["main", "dev"];

              if (context.eventName === "workflow_dispatch") {
                const extra = core.getInput("branches")
                  .split(",")
                  .map(b => b.trim())
                  .filter(Boolean);

                branches.push(...extra);
              }
            }

            // Remove duplicates
            branches = [...new Set(branches)];

            // Keep only branches that exist
            const valid = [];
            for (const branch of branches) {
              try {
                await github.rest.repos.getBranch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  branch
                });
                valid.push(branch);
              } catch (_) {
                core.info(`Skipping missing branch '${branch}'`);
              }
            }

            core.setOutput("branches", JSON.stringify(valid));

  analyze:
    runs-on: self-hosted

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        branch: ${{ fromJson(needs.prepare.outputs.branches) }}

    name: Analyze Java (${{ matrix.branch }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ matrix.branch }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java
          queries: security-extended
          config-file: ./.github/codeql/codeql-config.yml

      - name: Build project
        run: mvn clean package -DskipTests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
