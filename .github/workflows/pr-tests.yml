name: Maven PR Tests

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Apply formatting
        run: mvn -B -T 4 spotless:apply

      - name: Fail if formatting changes detected
        run: |
          if ! git diff --quiet; then
            {
              echo "## ❌ Formatting check failed"
              echo
              echo "Code is not properly formatted."
              echo
              echo "Run:"
              echo
              echo "\`\`\`bash"
              echo "mvn spotless:apply"
              echo "\`\`\`"
              echo
              echo "Or enable the git hook:"
              echo
              echo "\`\`\`bash"
              echo "./.githooks/enable"
              echo "\`\`\`"
            } >> "$GITHUB_STEP_SUMMARY"

            exit 1
          fi

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Build and test with Maven
        run: mvn -B -T 4 clean test

      - name: Summarize test failures
        if: failure()
        shell: bash
        run: |
          python3 <<'PY'
          import glob
          import os
          import xml.etree.ElementTree as ET

          summary = "test-summary.md" # os.environ["GITHUB_STEP_SUMMARY"]

          reports = glob.glob("**/target/surefire-reports/*.xml", recursive=True)

          with open(summary, "a", encoding="utf-8") as out:
              out.write("## ❌ Test failures\n\n")

              found = False

              for report in sorted(reports):
                  try:
                      root = ET.parse(report).getroot()
                  except ET.ParseError:
                      continue

                  failures = []

                  for testcase in root.findall("testcase"):
                      failure = testcase.find("failure")
                      error = testcase.find("error")

                      if failure is None and error is None:
                          continue

                      found = True

                      node = failure or error

                      classname = testcase.attrib.get("classname", "<unknown>")
                      name = testcase.attrib.get("name", "<unknown>")

                      message = (
                          node.attrib.get("message")
                          or (node.text or "").strip().splitlines()[0]
                          or "No message"
                      )

                      failures.append((classname, name, message))

                  if not failures:
                      continue

                  out.write(f"### {os.path.basename(report)}\n\n")

                  for classname, name, message in failures:
                      out.write(f"- `{classname}#{name}`\n")
                      out.write(f"  - {message}\n")

                  out.write("\n")

              if not found:
                  out.write("No Surefire test failures found.\n")
          PY

          cat test-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Update failure comment
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            const marker = '<!-- test-failures -->';
            const body = marker + '\n' + fs.readFileSync('test-summary.md', 'utf8');

            const {owner, repo} = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number }
            );

            const existing = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.deleteComment({
                owner,
                repo,
                comment_id: existing.id
              });
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body
            });

      - name: Delete failure comment
        if: success()
        uses: actions/github-script@v8
        with:
          script: |
            const marker = '<!-- test-failures -->';

            const {owner, repo} = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number }
            );

            const existing = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.deleteComment({
                owner,
                repo,
                comment_id: existing.id
              });
            }

